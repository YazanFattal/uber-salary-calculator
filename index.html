<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Uber Salary Calculator</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>Uber Salary Calculator</h1>
    <p>Calculate your expected daily earnings.</p>

    <div class="card">
      <label>Shift Hours</label>
      <input type="number" id="hours" placeholder="Example: 3" step="0.5">

      <label>Completed Orders</label>
      <input type="number" id="orders" placeholder="Example: 10">

      <label>Days Worked</label>
      <input type="number" id="days" placeholder="Example: 3" min="1" value="1">

      <label>Start Time</label>
      <select id="startTime">
        <option value="later">15:30 or later</option>
        <option value="earlier">15:00 or earlier</option>
      </select>

      <button onclick="calculateSalary()">Calculate</button>
    </div>

    <div class="result">
      <h2>Expected Earnings</h2>
      <p>Base Pay: <span id="basePay">€0.00</span></p>
      <p>Bonus: <span id="bonus">€0.00</span></p>
      <p>Days Worked: <span id="daysResult">1</span></p>
      <p class="total">Total: <span id="totalPay">€0.00</span></p>

    </div>
  </div>

  <script src="script.js"></script>

</body>
</html>
